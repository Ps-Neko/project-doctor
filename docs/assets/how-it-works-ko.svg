<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="330" viewBox="0 0 1200 330" role="img" aria-labelledby="title desc">
  <title id="title">프로젝트 주치의 사용 흐름</title><desc id="desc">검진을 요청하고, 쉬운 결과지를 읽고, 한 가지 변경을 승인하고, 되돌릴 수 있는 흐름입니다.</desc>
  <rect width="1200" height="330" fill="#f5f8f5"/><text x="60" y="68" fill="#20302a" font-family="Malgun Gothic, Arial, sans-serif" font-size="34" font-weight="700">이렇게 사용해요</text>
  <g font-family="Malgun Gothic, Arial, sans-serif"><g transform="translate(60 110)"><rect width="240" height="150" rx="14" fill="#fffdfa" stroke="#cfdbd3"/><text x="24" y="46" fill="#60746a" font-size="18">1단계</text><text x="24" y="82" fill="#20302a" font-size="25" font-weight="700">검진을 요청해요</text><text x="24" y="114" fill="#55645d" font-size="17">무엇이 궁금한지 말해요.</text></g><g transform="translate(330 110)"><rect width="240" height="150" rx="14" fill="#fffdfa" stroke="#cfdbd3"/><text x="24" y="46" fill="#60746a" font-size="18">2단계</text><text x="24" y="82" fill="#20302a" font-size="25" font-weight="700">결과지를 읽어요</text><text x="24" y="114" fill="#55645d" font-size="17">무엇을 고칠지 확인해요.</text></g><g transform="translate(600 110)"><rect width="240" height="150" rx="14" fill="#fffdfa" stroke="#cfdbd3"/><text x="24" y="46" fill="#60746a" font-size="18">3단계</text><text x="24" y="82" fill="#20302a" font-size="25" font-weight="700">하나씩 승인해요</text><text x="24" y="114" fill="#55645d" font-size="17">먼저 바꾸지 않아요.</text></g><g transform="translate(870 110)"><rect width="270" height="150" rx="14" fill="#eaf4ef" stroke="#b9d5c2"/><text x="24" y="46" fill="#4b6a55" font-size="18">4단계</text><text x="24" y="82" fill="#20302a" font-size="25" font-weight="700">언제든 되돌려요</text><text x="24" y="114" fill="#55645d" font-size="17">변경은 되돌릴 수 있어요.</text></g></g>
  <g fill="#8ba095"><path d="M305 177h16v-8l16 16-16 16v-8h-16z"/><path d="M575 177h16v-8l16 16-16 16v-8h-16z"/><path d="M845 177h16v-8l16 16-16 16v-8h-16z"/></g>
</svg>
