<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="330" viewBox="0 0 1200 330" role="img" aria-labelledby="title desc">
  <title id="title">How Project Doctor works</title><desc id="desc">Four steps: ask for a checkup, receive a plain-language report, approve one change, and keep an undo option.</desc>
  <rect width="1200" height="330" fill="#f5f8f5"/><text x="60" y="68" fill="#20302a" font-family="Arial, sans-serif" font-size="34" font-weight="700">How it works</text>
  <g font-family="Arial, sans-serif"><g transform="translate(60 110)"><rect width="240" height="150" rx="14" fill="#fffdfa" stroke="#cfdbd3"/><text x="24" y="46" fill="#60746a" font-size="18">STEP 1</text><text x="24" y="82" fill="#20302a" font-size="25" font-weight="700">Ask for a checkup</text><text x="24" y="114" fill="#55645d" font-size="17">Tell it what you need.</text></g><g transform="translate(330 110)"><rect width="240" height="150" rx="14" fill="#fffdfa" stroke="#cfdbd3"/><text x="24" y="46" fill="#60746a" font-size="18">STEP 2</text><text x="24" y="82" fill="#20302a" font-size="25" font-weight="700">Read the report</text><text x="24" y="114" fill="#55645d" font-size="17">See what and where.</text></g><g transform="translate(600 110)"><rect width="240" height="150" rx="14" fill="#fffdfa" stroke="#cfdbd3"/><text x="24" y="46" fill="#60746a" font-size="18">STEP 3</text><text x="24" y="82" fill="#20302a" font-size="25" font-weight="700">Approve one fix</text><text x="24" y="114" fill="#55645d" font-size="17">Nothing changes first.</text></g><g transform="translate(870 110)"><rect width="270" height="150" rx="14" fill="#eaf4ef" stroke="#b9d5c2"/><text x="24" y="46" fill="#4b6a55" font-size="18">STEP 4</text><text x="24" y="82" fill="#20302a" font-size="25" font-weight="700">Keep an undo option</text><text x="24" y="114" fill="#55645d" font-size="17">Every change is reversible.</text></g></g>
  <g fill="#8ba095"><path d="M305 177h16v-8l16 16-16 16v-8h-16z"/><path d="M575 177h16v-8l16 16-16 16v-8h-16z"/><path d="M845 177h16v-8l16 16-16 16v-8h-16z"/></g>
</svg>
