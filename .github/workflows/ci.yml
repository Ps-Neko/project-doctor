name: CI

# 절차의 일관성이 이 저장소의 제품이므로, 버전 정합·채점기·형식 검증기·문서 링크를
# 푸시/PR마다 자동 점검한다 (BACKLOG BL-15·20·21). 외부 의존성 없이 표준 라이브러리만 사용.
# 주 사용자가 Windows이고 쓰기 경계 도구가 OS 경로 문법에 의존하므로 ubuntu+windows 양축에서 돈다.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 최소권한: 이 워크플로는 코드를 체크아웃해 테스트만 돌리고 토큰으로 쓰기·코멘트를 하지 않는다.
# 기본 GITHUB_TOKEN 권한을 읽기 전용으로 좁혀 다른 액션 침해 시 영향 범위를 줄인다.
permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        # SPEC.md가 보조 스크립트를 "Python 3.10+"로 약속하므로, 하한(3.10)·중간(3.11)·
        # 상한(3.12)을 함께 돌려 그 약속을 실제로 검증한다 (스크립트는 표준 라이브러리만 쓴다).
        python-version: ["3.10", "3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: pytest 설치 (테스트 코드는 표준 라이브러리만 쓰지만 러너는 필요)
        run: python -m pip install --upgrade pip pytest

      - name: 버전 정합 검사 (SKILL ↔ README ↔ CHANGELOG)
        run: python tests/check_version.py

      - name: 채점기·형식 검증기·쓰기경계 단위 테스트 (pytest)
        run: python -m pytest tests/ -v

      - name: 자체 픽스처 채점 회귀 (정답지 → 100%·오탐 0)
        run: python tests/check_scoring_regression.py

      - name: 문서 링크 검사
        run: python tests/check_links.py

      - name: golden 보고서 E2E (실보고서가 verify+compare 동시 통과하는지)
        run: python tests/run_checks.py tests/golden/checkup-report.md tests/fixtures/messy-project/EXPECTED.md

      - name: golden 보고서 E2E — leaky (보안 픽스처 SEC/PII 위치까지 회귀)
        run: python tests/run_checks.py tests/golden/leaky-report.md tests/fixtures/leaky-project/EXPECTED.md
