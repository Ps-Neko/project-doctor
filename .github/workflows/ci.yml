name: CI

# 절차의 일관성이 이 저장소의 제품이므로, 버전 정합·채점기·형식 검증기·문서 링크를
# 푸시/PR마다 자동 점검한다 (BACKLOG BL-15·20·21). 외부 의존성 없이 표준 라이브러리만 사용.
# 주 사용자가 Windows이고 쓰기 경계 도구가 OS 경로 문법에 의존하므로 ubuntu+windows 양축에서 돈다.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: pytest 설치 (테스트 코드는 표준 라이브러리만 쓰지만 러너는 필요)
        run: python -m pip install --upgrade pip pytest

      - name: 버전 정합 검사 (SKILL ↔ README ↔ CHANGELOG)
        run: python tests/check_version.py

      - name: 채점기·형식 검증기·쓰기경계 단위 테스트 (pytest)
        run: python -m pytest tests/ -v

      - name: 자체 픽스처 채점 회귀 (정답지 → 100%·오탐 0)
        run: python tests/check_scoring_regression.py

      - name: 문서 링크 검사
        run: python tests/check_links.py
